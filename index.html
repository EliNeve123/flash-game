<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binding of Isaac</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}

#game {
  width: 100vw;
  height: 100vh;
}
</style>
</head>

<body>

<div id="game"></div>

<script>
window.addEventListener("load", () => {
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  document.getElementById("game").appendChild(player);

  player.style.width = "100%";
  player.style.height = "100%";

  player.load("https://archive.org/download/isaac-wrath-of-the-lamb/isaac-wotl.swf")
    .catch(err => {
      console.error(err);
      document.body.innerHTML = "Failed to load game";
    });
});
</script>

</body>
</html>
