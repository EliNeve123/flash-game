<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binding of Isaac: Wrath of the Lamb</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}

#flash-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
}
</style>
</head>

<body>

<div id="flash-container"></div>

<script>
const container = document.getElementById("flash-container");

function resizeGame() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const ratio = 5.5 / 3;

  let width = w;
  let height = w / ratio;

  if (height > h) {
    height = h;
    width = h * ratio;
  }

  container.style.width = width + "px";
  container.style.height = height + "px";
}

window.addEventListener("resize", resizeGame);

window.addEventListener("load", () => {
  resizeGame();

  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  container.appendChild(player);

  player.style.width = "100%";
  player.style.height = "100%";

  player.load("https://cdn.jsdelivr.net/gh/RobiFet/CMinterview@a4017231eca9f2173ad7ec0e63b01e4786b4ad6b/web/src/BiWrath.swf")
    .catch(err => {
      console.error(err);
      container.textContent = "Failed to load game";
    });
});
</script>

</body>
</html>
